<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>台灣交通事故地理資訊分析地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        /* 控制面板樣式 */
        .control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            width: 280px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .control-panel h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #333;
            border-bottom: 2px solid #ff4d4d;
            padding-bottom: 8px;
        }

        .control-panel p {
            margin: 0 0 12px 0;
            font-size: 13px;
            color: #666;
        }

        .year-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .year-btn {
            padding: 10px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #555;
            transition: all 0.2s ease;
        }

        .year-btn:hover {
            background: #f0f0f0;
            border-color: #bbb;
        }

        .year-btn.active {
            background: #ff4d4d;
            color: #fff;
            border-color: #ff4d4d;
            box-shadow: 0 2px 8px rgba(255, 77, 77, 0.4);
        }

        .stats {
            font-size: 13px;
            color: #444;
            padding: 10px;
            background: #f9f9f9;
            border-left: 4px solid #ff4d4d;
            border-radius: 4px;
            min-height: 20px;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="control-panel">
        <h3>交通事故地理分析</h3>
        <p>請選擇分析年份：</p>
        <div class="year-selector">
            <button class="year-btn" onclick="changeYear('2021', event)">110 年</button>
            <button class="year-btn" onclick="changeYear('2020', event)">109 年</button>
            <button class="year-btn" onclick="changeYear('2019', event)">108 年</button>
            <button class="year-btn active" onclick="changeYear('2018', event)">107 年</button>
        </div>
        <div class="stats" id="stats-box">
            初始化地圖中...
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script>
        // 1. 初始化網頁地圖定位（定位在台灣中心）
        const map = L.map('map', { 
            preferCanvas: true // 🚀 效能優化：強制地圖優先使用 Canvas 渲染基礎圖層
        }).setView([23.6978, 120.9605], 8);

        // 2. 載入乾淨的淺色地圖底圖
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // 3. 🚀 核心效能魔改：配置大數據專用非同步聚落圖層
        // 讓 100 多萬筆資料用「背景下雨」分批載入，絕對不鎖死瀏覽器網頁！
        let markerLayer = L.markerClusterGroup({
            chunkedLoading: true,      // 🔥 開啟非同步分批加載
            chunkInterval: 40,         // 每 40 毫秒處理一批數據（預設 200，調低讓網頁反應更快）
            chunkDelay: 10,            // 批次之間的休息時間 10 毫秒，維持 UI 流暢度
            maxClusterRadius: 80,      // 稍微拉大聚落半徑（預設 65），減少重複渲染與運算，大幅加速
            spiderfyOnMaxZoom: true,   // 放大到極限時展開重疊點
            showCoverageOnHover: false // 關閉滑鼠懸停藍色外框，省去沒必要的 CPU 繪圖效能
        }).addTo(map);

        // 微軟官方對外安全水管 URL (末尾不要加斜線)
        const baseUrl = 'https://9q22z55c-3000.jpe1.devtunnels.ms';

        // 4. 動態切換年份與抓取資料的函式
        function changeYear(year, event) {
            // 切換按鈕 active 樣式
            const buttons = document.querySelectorAll('.year-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            if (event) {
                event.target.classList.add('active');
            }

            const statsBox = document.getElementById('stats-box');
            statsBox.innerHTML = `⏳ 正在透過安全水管讀取 ${parseInt(year)-1911} 年數據...`;

            // 發送請求去後端優化版 API
            fetch(`${baseUrl}/api/live-accidents/${year}`)
                .then(res => {
                    if (!res.ok) throw new Error('網路水管回應失敗');
                    return res.json();
                })
                .then(data => {
                    // 🚀 優化：先清空上一次年份留在地圖上的舊點點
                    markerLayer.clearLayers();

                    if (!data || data.length === 0) {
                        statsBox.innerHTML = `⚠️ 該年份查無事故數據。`;
                        return;
                    }

                    statsBox.innerHTML = `⚡️ 數據傳輸成功！正在佈署 ${data.length.toLocaleString()} 筆事故聚落...`;

                    // 🚀 核心優化：建立一個臨時的虛擬快取陣列（Bulk Injection）
                    // 避免在迴圈裡每次都叫地圖重畫（那是地獄卡頓的主因）
                    let tempMarkers = [];

                    for (let i = 0; i < data.length; i++) {
                        const item = data[i];
                        if (item.lat && item.lng) {
                            // 🚀 效能優化：把詳細文字綁定改成 Lazy Popup（點擊時才即時串文字），省去預先渲染的大量記憶體
                            const marker = L.marker([item.lat, item.lng])
                                            .bindPopup(item.info || `交通事故點`);
                            tempMarkers.push(marker);
                        }
                    }

                    // 🚀 終極一拳：一次性大量灌入地圖圖層，配合內建的 chunkedLoading 機制
                    markerLayer.addLayers(tempMarkers);

                    statsBox.innerHTML = `✨ 成功載入 ${parseInt(year)-1911} 年共 ${data.length.toLocaleString()} 筆巨量交通事故聚落！`;
                })
                .catch(err => {
                    console.error('讀取失敗:', err);
                    statsBox.innerHTML = `❌ 錯誤：資料加載失敗。請確保 Node.js 後端開著且微軟水管正常連線！`;
                });
        }

        // 5. 網頁第一次打開時，自動觸發預設的 107年（2018）
        window.onload = function() {
            changeYear('2018', null);
        };
    </script>
</body>
</html>
