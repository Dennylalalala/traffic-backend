<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>台灣交通事故地理資訊分析地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        /* 控制面板樣式 */
        .control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            width: 280px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .control-panel h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #333;
            border-bottom: 2px solid #ff4d4d;
            padding-bottom: 8px;
        }

        .control-panel p {
            margin: 0 0 12px 0;
            font-size: 13px;
            color: #666;
        }

        .year-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .year-btn {
            padding: 10px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #555;
            transition: all 0.2s ease;
        }

        .year-btn:hover {
            background: #f0f0f0;
            border-color: #bbb;
        }

        .year-btn.active {
            background: #ff4d4d;
            color: #fff;
            border-color: #ff4d4d;
            box-shadow: 0 2px 8px rgba(255, 77, 77, 0.4);
        }

        .stats {
            font-size: 13px;
            color: #444;
            padding: 10px;
            background: #f9f9f9;
            border-left: 4px solid #ff4d4d;
            border-radius: 4px;
            min-height: 20px;
            word-break: break-all;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="control-panel">
        <h3>交通事故地理 analysis</h3>
        <p>請選擇分析年份：</p>
        <div class="year-selector">
            <button class="year-btn active" onclick="changeYear('2021', event)">110 年</button>
            <button class="year-btn" onclick="changeYear('2020', event)">109 年</button>
            <button class="year-btn" onclick="changeYear('2019', event)">108 年</button>
            <button class="year-btn" onclick="changeYear('2018', event)">107 年</button>
        </div>
        <div class="stats" id="stats-box">
            初始化地圖中...
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script>
        // 1. 初始化網頁地圖定位
        const map = L.map('map', { 
            preferCanvas: true 
        }).setView([23.6, 120.7], 7.5); 

        // 2. 載入乾淨的淺色地圖底圖
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // 3. 大數據專用非同步聚落圖層設定 (maxClusterRadius: 80)
        let markerLayer = L.markerClusterGroup({
            chunkedLoading: true,      
            chunkInterval: 40,         
            chunkDelay: 10,            
            maxClusterRadius: 80,      
            spiderfyOnMaxZoom: true,   
            showCoverageOnHover: false 
        }).addTo(map);

        // 🟢 完美接通：你目前 VS Code Ports 轉發的最新微軟安全水管 URL
        const baseUrl = 'https://k6nffc8b-3000.jpe1.devtunnels.ms';

        let currentTimeoutId = null;

        // 4. 動態切換年份與抓取資料的函式
        function changeYear(year, event) {
            if (currentTimeoutId) {
                clearTimeout(currentTimeoutId);
            }

            const buttons = document.querySelectorAll('.year-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            if (event) {
                event.target.classList.add('active');
            }

            const statsBox = document.getElementById('stats-box');
            statsBox.innerHTML = `⏳ 正在透過微軟水管讀取 ${parseInt(year)-1911} 年數據...`;

            // 🟢 終極校正：精準符合你 server.js 的 /api/live-accidents/:year 路由格式！
            fetch(`${baseUrl}/api/live-accidents/${year}`)
                .then(res => {
                    if (!res.ok) throw new Error('網路水管回應失敗');
                    return res.json();
                })
                .then(data => {
                    markerLayer.clearLayers();

                    if (!data || data.length === 0) {
                        statsBox.innerHTML = `⚠️ 該年份查無事故數據。`;
                        return;
                    }

                    statsBox.innerHTML = `⚡️ 成功撈取 ${data.length.toLocaleString()} 筆！開始即時同步地圖...`;

                    const batchSize = 20000; // 每 2 萬筆分批漸進渲染（符合分批下雨技術）
                    let processedCount = 0;
                    let validRenderedCount = 0; 

                    function renderBatch(startIndex) {
                        const endIndex = Math.min(startIndex + batchSize, data.length);
                        let batchMarkers = [];

                        // 離島多點地理圍欄判定
                        const checkPointInTaiwan = (lat, lng) => {
                            if (lat >= 21.9 && lat <= 25.3 && lng >= 120.1 && lng <= 122.1) return true; // 本島
                            if (lat >= 23.1 && lat <= 23.8 && lng >= 119.2 && lng <= 119.8) return true; // 澎湖
                            if (lat >= 24.3 && lat <= 24.6 && lng >= 118.1 && lng <= 118.6) return true; // 金門
                            if (lat >= 26.0 && lat <= 26.4 && lng >= 119.8 && lng <= 120.2) return true; // 馬祖
                            if (lat >= 22.5 && lat <= 22.8 && lng >= 121.3 && lng <= 121.6) return true; // 綠島
                            if (lat >= 21.9 && lat <= 22.2 && lng >= 121.4 && lng <= 121.7) return true; // 蘭嶼
                            return false;
                        };

                        for (let i = startIndex; i < endIndex; i++) {
                            const item = data[i];
                            
                            if (item.lat && item.lng) {
                                if (checkPointInTaiwan(item.lat, item.lng)) {
                                    // 完美展現數字大泡泡圖層
                                    const marker = L.marker([item.lat, item.lng])
                                                    .bindPopup(item.info || `交通事故點`);
                                    batchMarkers.push(marker);
                                }
                            }
                        }

                        markerLayer.addLayers(batchMarkers);
                        processedCount += (endIndex - startIndex);
                        validRenderedCount += batchMarkers.length;

                        // 跑馬燈即時跳動效果
                        statsBox.innerHTML = `⏳ 正在即時過濾並更新...<br>已分析：${processedCount.toLocaleString()} / ${data.length.toLocaleString()} 筆<br>✨ 已定位：${validRenderedCount.toLocaleString()} 筆`;

                        if (endIndex < data.length) {
                            currentTimeoutId = setTimeout(() => renderBatch(endIndex), 1);
                        } else {
                            statsBox.innerHTML = `✨ 成功載入 ${parseInt(year)-1911} 年共 ${validRenderedCount.toLocaleString()} 筆台灣交通事故數據！<br>（本島與離島區域皆已完美定位）`;
                            currentTimeoutId = null;
                        }
                    }

                    renderBatch(0);
                })
                .catch(err => {
                    console.error('讀取失敗:', err);
                    statsBox.innerHTML = `❌ 錯誤：資料加載失敗。請確保 Node.js 後端開著且微軟水管正常連線！`;
                });
        }

        // 網頁一打開，預設加載 110 年（西元 2021）
        window.onload = function() {
            changeYear('2021', null);
        };
    </script>
</body>
</html>
