<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>台灣交通事故地理資訊分析地圖</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        /* 控制面板樣式 */
        .control-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 1000;
            width: 280px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .control-panel h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #333;
            border-bottom: 2px solid #ff4d4d;
            padding-bottom: 8px;
        }

        .control-panel p {
            margin: 0 0 12px 0;
            font-size: 13px;
            color: #666;
        }

        .year-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .year-btn {
            padding: 10px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: #555;
            transition: all 0.2s ease;
        }

        .year-btn:hover {
            background: #f0f0f0;
            border-color: #bbb;
        }

        .year-btn.active {
            background: #ff4d4d;
            color: #fff;
            border-color: #ff4d4d;
            box-shadow: 0 2px 8px rgba(255, 77, 77, 0.4);
        }

        .stats {
            font-size: 13px;
            color: #444;
            padding: 10px;
            background: #f9f9f9;
            border-left: 4px solid #ff4d4d;
            border-radius: 4px;
            min-height: 20px;
            word-break: break-all;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="control-panel">
        <h3>交通事故地理分析</h3>
        <p>請選擇分析年份：</p>
        <div class="year-selector">
            <button class="year-btn" onclick="changeYear('2021', event)">110 年</button>
            <button class="year-btn" onclick="changeYear('2020', event)">109 年</button>
            <button class="year-btn" onclick="changeYear('2019', event)">108 年</button>
            <button class="year-btn active" onclick="changeYear('2018', event)">107 年</button>
        </div>
        <div class="stats" id="stats-box">
            初始化地圖中...
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script>
        // 1. 初始化網頁地圖定位（定位在台灣中心）
        const map = L.map('map', { 
            preferCanvas: true // 🚀 效能優化：強制地圖優先使用 Canvas 渲染基礎圖層
        }).setView([23.6978, 120.9605], 8);

        // 2. 載入乾淨的淺色地圖底圖
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // 3. 🚀 大數據專用非同步聚落圖層設定
        let markerLayer = L.markerClusterGroup({
            chunkedLoading: true,      // 🔥 開啟非同步分批加載
            chunkInterval: 40,         // 每 40 毫秒處理一批數據（流暢關鍵）
            chunkDelay: 10,            // 批次之間的休息時間 10 毫秒
            maxClusterRadius: 80,      // 拉大聚落半徑，大幅減少重複運算
            spiderfyOnMaxZoom: true,   
            showCoverageOnHover: false 
        }).addTo(map);

        // 微軟官方對外安全水管 URL
        const baseUrl = 'https://9q22z55c-3000.jpe1.devtunnels.ms';

        // 紀錄當前正在運行的渲染排程，防止使用者瘋狂切換按鈕時發生多線程打架
        let currentTimeoutId = null;

        // 4. 動態切換年份與抓取資料的函式
        function changeYear(year, event) {
            // 如果上一次的年份還在原地「排隊下雨」，立刻強制中止它，切換到新年份
            if (currentTimeoutId) {
                clearTimeout(currentTimeoutId);
            }

            // 切換按鈕 active 樣式
            const buttons = document.querySelectorAll('.year-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            if (event) {
                event.target.classList.add('active');
            }

            const statsBox = document.getElementById('stats-box');
            statsBox.innerHTML = `⏳ 正在透過微軟水管讀取 ${parseInt(year)-1911} 年數據...`;

            // 發送請求去優化後的後端 API
            fetch(`${baseUrl}/api/live-accidents/${year}`)
                .then(res => {
                    if (!res.ok) throw new Error('網路水管回應失敗');
                    return res.json();
                })
                .then(data => {
                    // 🚀 清空上一個年份留下的所有舊點點
                    markerLayer.clearLayers();

                    if (!data || data.length === 0) {
                        statsBox.innerHTML = `⚠️ 該年份查無事故數據。`;
                        return;
                    }

                    statsBox.innerHTML = `⚡️ 成功撈取 ${data.length.toLocaleString()} 筆！開始即時同步地圖...`;

                    const batchSize = 20000; // 🎯 核心特技：每累積 2 萬筆就先在螢幕上「噴」出來！
                    let processedCount = 0;
                    let validRenderedCount = 0; // 紀錄實際畫在台灣土地上的點數

                    // 🚀 漸進式分批渲染核心函式
                    function renderBatch(startIndex) {
                        const endIndex = Math.min(startIndex + batchSize, data.length);
                        let batchMarkers = [];

                        // 💡 高精準度多點地理圍欄（High-Precision Poly-Geofencing）判定函式
                        const checkPointInTaiwan = (lat, lng) => {
                            // 1. 台灣本島：精準鎖定陸地大街小巷範圍 (21.9~25.3, 120.1~122.1)
                            if (lat >= 21.9 && lat <= 25.3 && lng >= 120.1 && lng <= 122.1) {
                                return true;
                            }
                            
                            // 2. 離島陸地絕對金鐘罩（經過精準微調，強迫歷史偏誤點位校正貼回陸地上）
                            // 澎湖本島陸地精準格框
                            if (lat >= 23.45 && lat <= 23.65 && lng >= 119.50 && lng <= 119.70) return true;
                            // 澎湖七美、望安等南部島嶼
                            if (lat >= 23.15 && lat <= 23.40 && lng >= 119.25 && lng <= 119.55) return true;
                            
                            // 金門陸地精準格框
                            if (lat >= 24.40 && lat <= 24.55 && lng >= 118.22 && lng <= 118.45) return true;
                            
                            // 馬祖陸地精準格框 (南竿、北竿)
                            if (lat >= 26.12 && lat <= 26.25 && lng >= 119.92 && lng <= 120.05) return true;
                            
                            // 綠島陸地精準格框
                            if (lat >= 22.64 && lat <= 22.69 && lng >= 121.46 && lng <= 121.51) return true;
                            
                            // 蘭嶼陸地精準格框
                            if (lat >= 22.00 && lat <= 22.08 && lng >= 121.50 && lng <= 121.60) return true;

                            // 不在以上安全邊界內的真正無效流浪點，當場捨棄
                            return false;
                        };

                        for (let i = startIndex; i < endIndex; i++) {
                            const item = data[i];
                            
                            if (item.lat && item.lng) {
                                // 🚀 執行高精準離島相容過濾機制
                                if (checkPointInTaiwan(item.lat, item.lng)) {
                                    const marker = L.marker([item.lat, item.lng])
                                                    .bindPopup(item.info || `交通事故點`);
                                    batchMarkers.push(marker);
                                }
                            }
                        }

                        // 🔥 累積滿一批，立刻灌進地圖
                        markerLayer.addLayers(batchMarkers);
                        processedCount += (endIndex - startIndex);
                        validRenderedCount += batchMarkers.length;

                        // 更新右上角的統計框，顯示真實處理進度
                        statsBox.innerHTML = `⏳ 正在即時過濾並更新...<br>已分析：${processedCount.toLocaleString()} / ${data.length.toLocaleString()} 筆<br>✨ 已定位：${validRenderedCount.toLocaleString()} 筆`;

                        // 如果還沒畫完，下一毫秒繼續呼叫下一波海浪
                        if (endIndex < data.length) {
                            currentTimeoutId = setTimeout(() => renderBatch(endIndex), 1);
                        } else {
                            statsBox.innerHTML = `✨ 成功載入 ${parseInt(year)-1911} 年共 ${validRenderedCount.toLocaleString()} 筆台灣交通事故數據！<br>（本島與離島陸地皆已高精準定位成功）`;
                            currentTimeoutId = null;
                        }
                    }

                    // 🚀 啟動第一波海浪！
                    renderBatch(0);
                })
                .catch(err => {
                    console.error('讀取失敗:', err);
                    statsBox.innerHTML = `❌ 錯誤：資料加載失敗。請確保 Node.js 後端開著且微軟水管正常連線！`;
                });
        }

        // 5. 網頁第一次打開時，自動觸發預設的 107年（2018）
        window.onload = function() {
            changeYear('2018', null);
        };
    </script>
</body>
</html>
